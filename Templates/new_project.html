<!DOCTYPE html>
<html>
<head>
    <title>New Project - Construction Estimator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; padding: 20px; color: #eee; }
        .container { max-width: 600px; margin: 0 auto; background: #16213e; padding: 30px; border-radius: 8px; }
        h1 { color: #e94560; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #ccc; font-weight: bold; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #0f3460; border-radius: 4px; background: #0f3460; color: #eee; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border-color: #e94560; }
        textarea { resize: vertical; min-height: 100px; }
        .btn { padding: 12px 24px; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #c73652; }
        .btn-secondary { background: #0f3460; margin-left: 10px; text-decoration: none; display: inline-block; padding: 12px 24px; border-radius: 4px; color: white; }
        .btn-secondary:hover { background: #1a4a7a; }
        .breadcrumb { color: #888; margin-bottom: 20px; font-size: 14px; }
        .breadcrumb a { color: #e94560; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="breadcrumb"><a href="/">Home</a> > New Project</div>
        <h1>Create New Project</h1>
        <p class="subtitle">Fill in the project details below</p>

        <form onsubmit="createProject(event)">
            <div class="form-group">
                <label for="project_name">Project Name *</label>
                <input type="text" id="project_name" name="project_name" placeholder="e.g., Downtown Office Building" required>
            </div>
            <div class="form-group">
                <label for="project_number">Project Number</label>
                <input type="text" id="project_number" name="project_number" placeholder="e.g., 2024-001">
            </div>
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" placeholder="e.g., Denver, CO">
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="Brief project description..."></textarea>
            </div>
            <div style="margin-top: 30px;">
                <button type="submit" class="btn">Create Project</button>
                <a href="/" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script>
        function createProject(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            fetch('/project/new', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.success) window.location.href = '/project/' + data.project_id;
            });
        }
    </script>
</body>
</html>
