<style>
.nav-bar { background: #0d1b2a; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #e94560; border-radius: 6px 6px 0 0; }
.nav-brand { color: #e94560; font-weight: bold; font-size: 16px; text-decoration: none; }
.nav-right { display: flex; align-items: center; gap: 16px; font-size: 13px; }
.nav-co { color: #888; }
.nav-user { color: #eee; font-weight: bold; }
.nav-link { color: #aaa; text-decoration: none; }
.nav-link:hover { color: #e94560; }
.nav-logout { color: #e94560 !important; }
</style>
<div class="nav-bar">
    <a href="/" class="nav-brand">Construction Estimator</a>
    <div class="nav-right">
        {% if current_user.is_authenticated %}
        <span class="nav-co">{{ current_user.company.company_name }}</span>
        <span class="nav-user">{{ current_user.username }}</span>
        {% if current_user.role == 'admin' %}<a href="/admin" class="nav-link">Admin</a>{% endif %}
        <a href="/profile" class="nav-link">Profile</a>
        <a href="/logout" class="nav-link nav-logout">Logout</a>
        {% endif %}
    </div>
</div>
