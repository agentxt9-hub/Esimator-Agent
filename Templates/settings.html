<!DOCTYPE html>
<html>
<head>
    <title>Settings — Construction Estimator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .page { max-width: 900px; margin: 0 auto; }
        .inner { background: #16213e; border-radius: 8px; padding: 28px; }
        .breadcrumb { color: #888; margin-bottom: 20px; font-size: 13px; }
        .breadcrumb a { color: #e94560; text-decoration: none; }
        h1 { color: #e94560; margin-bottom: 6px; font-size: 22px; }
        .page-sub { color: #888; font-size: 13px; margin-bottom: 28px; }
        h2 { color: #eee; font-size: 16px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #0f3460; }
        .section { margin-bottom: 36px; }
        .btn { display: inline-block; padding: 8px 18px; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: Arial, sans-serif; }
        .btn:hover { background: #c73652; }
        .btn-secondary { background: #0f3460; }
        .btn-secondary:hover { background: #1a4a7a; }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        .btn-danger { background: #3a0a12; color: #e94560; border: 1px solid #e94560; }
        .btn-danger:hover { background: #e94560; color: white; }
        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 12px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 9px; border: 1px solid #0f3460; border-radius: 4px; background: #0d1b2a; color: #eee; font-size: 13px; font-family: Arial, sans-serif; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #e94560; }
        .fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .fg3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
        .logo-preview { width: 120px; height: 60px; object-fit: contain; background: #0d1b2a; border: 1px solid #0f3460; border-radius: 4px; margin-bottom: 10px; display: block; }
        .prop-list { list-style: none; }
        .prop-list li { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #0d1b2a; border: 1px solid #1a2a3a; border-radius: 4px; margin-bottom: 6px; }
        .prop-name { color: #eee; font-size: 13px; }
        .add-row { display: flex; gap: 8px; margin-top: 10px; }
        .add-row input { flex: 1; padding: 8px; }
        .save-msg { color: #7bde9b; font-size: 12px; margin-left: 10px; display: none; }
    </style>
</head>
<body>
<div class="page"><div class="inner">
{% include 'nav.html' %}
    <div class="breadcrumb"><a href="/">Home</a> &gt; Settings</div>
    <h1>Settings</h1>
    <p class="page-sub">Company profile and global property lists</p>

    <!-- ── Company Profile ── -->
    <div class="section">
        <h2>Company Profile</h2>
        {% if company and company.logo_path %}
        <img src="/uploads/logo/{{ company.logo_path }}" class="logo-preview" alt="Company Logo">
        {% endif %}
        <form id="companyForm" enctype="multipart/form-data">
            <div class="fg2">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" name="company_name" value="{{ company.company_name or '' if company else '' }}">
                </div>
                <div class="form-group">
                    <label>Logo (image file)</label>
                    <input type="file" name="logo" accept="image/*">
                </div>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" value="{{ company.address or '' if company else '' }}">
            </div>
            <div class="fg3">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city" value="{{ company.city or '' if company else '' }}">
                </div>
                <div class="form-group">
                    <label>State</label>
                    <input type="text" name="state" value="{{ company.state or '' if company else '' }}">
                </div>
                <div class="form-group">
                    <label>Zip Code</label>
                    <input type="text" name="zip_code" value="{{ company.zip_code or '' if company else '' }}">
                </div>
            </div>
            <div class="fg2">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" value="{{ company.phone or '' if company else '' }}">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ company.email or '' if company else '' }}">
                </div>
            </div>
            <button type="button" class="btn" onclick="saveCompany()">Save Company Profile</button>
            <span class="save-msg" id="company-save-msg">Saved!</span>
        </form>
    </div>

    <!-- ── Global Properties ── -->
    <div class="section">
        <h2>Trades</h2>
        <ul class="prop-list" id="list-trade"></ul>
        <div class="add-row">
            <input type="text" id="new-trade" placeholder="Add new trade…" onkeydown="if(event.key==='Enter')addProp('trade')">
            <button class="btn btn-sm" onclick="addProp('trade')">Add</button>
        </div>
    </div>

    <div class="section">
        <h2>Project Types</h2>
        <ul class="prop-list" id="list-project_type"></ul>
        <div class="add-row">
            <input type="text" id="new-project_type" placeholder="Add new project type…" onkeydown="if(event.key==='Enter')addProp('project_type')">
            <button class="btn btn-sm" onclick="addProp('project_type')">Add</button>
        </div>
    </div>

    <div class="section">
        <h2>Market Sectors</h2>
        <ul class="prop-list" id="list-market_sector"></ul>
        <div class="add-row">
            <input type="text" id="new-market_sector" placeholder="Add new market sector…" onkeydown="if(event.key==='Enter')addProp('market_sector')">
            <button class="btn btn-sm" onclick="addProp('market_sector')">Add</button>
        </div>
    </div>

</div></div>

<script id="propsData" type="application/json">{{ props_json | safe }}</script>
<script>
let props = JSON.parse(document.getElementById('propsData').textContent);

function renderLists() {
    ['trade', 'project_type', 'market_sector'].forEach(cat => {
        const ul = document.getElementById('list-' + cat);
        const items = props.filter(p => p.category === cat);
        if (!items.length) {
            ul.innerHTML = '<li style="color:#555; font-size:12px; padding:8px 12px;">No items yet</li>';
            return;
        }
        ul.innerHTML = items.map(p => `
            <li>
                <span class="prop-name">${esc(p.name)}</span>
                <button class="btn btn-danger btn-sm" onclick="deleteProp(${p.id}, '${cat}')">✕</button>
            </li>
        `).join('');
    });
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addProp(category) {
    const inp = document.getElementById('new-' + category);
    const name = inp.value.trim();
    if (!name) return;
    fetch('/settings/property/new', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category, name })
    }).then(r => r.json()).then(data => {
        if (data.success) {
            if (!props.find(p => p.id === data.id)) {
                props.push({ id: data.id, category, name: data.name });
            }
            inp.value = '';
            renderLists();
        }
    });
}

function deleteProp(id, category) {
    if (!confirm('Remove this item? It will not affect existing projects.')) return;
    fetch('/settings/property/' + id + '/delete', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                props = props.filter(p => p.id !== id);
                renderLists();
            }
        });
}

function saveCompany() {
    const form = document.getElementById('companyForm');
    const fd = new FormData(form);
    fetch('/settings/company/update', { method: 'POST', body: fd })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                const msg = document.getElementById('company-save-msg');
                msg.style.display = 'inline';
                setTimeout(() => msg.style.display = 'none', 2500);
            }
        });
}

renderLists();
</script>

    {% include 'agentx_panel.html' %}
</body>
</html>
