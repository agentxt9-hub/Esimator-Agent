<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estimator AgentX - Test Report</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a1628;
            color: #e2e8f0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #991b1b 100%);
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header .timestamp {
            opacity: 0.8;
            font-size: 14px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
        }
        .stat-card.passed { border-left-color: #10b981; }
        .stat-card.failed { border-left-color: #ef4444; }
        .stat-card .label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }
        .test-results {
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
        }
        .test-category {
            background: #0f172a;
            padding: 15px 20px;
            font-weight: 600;
            border-bottom: 1px solid #334155;
        }
        .test-item {
            padding: 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }
        .test-item:last-child { border-bottom: none; }
        .test-icon {
            font-size: 24px;
            flex-shrink: 0;
        }
        .test-content {
            flex-grow: 1;
        }
        .test-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .test-error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 8px;
        }
        .test-duration {
            font-size: 12px;
            opacity: 0.6;
        }
        .test-details {
            background: #0f172a;
            padding: 12px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Estimator AgentX Test Report</h1>
            <div class="timestamp">Generated: 2026-03-17 14:33:03</div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="label">Total Tests</div>
                <div class="value">2</div>
            </div>
            <div class="stat-card passed">
                <div class="label">Passed</div>
                <div class="value">0</div>
            </div>
            <div class="stat-card failed">
                <div class="label">Failed</div>
                <div class="value">2</div>
            </div>
            <div class="stat-card">
                <div class="label">Pass Rate</div>
                <div class="value">0.0%</div>
            </div>
        </div>
        
        <div class="test-results">

            <div class="test-category">Project Management</div>

            <div class="test-item">
                <div class="test-icon">❌</div>
                <div class="test-content">
                    <div class="test-name">Create Project</div>
                    <div class="test-duration">6.06s</div>
                    <div class="test-error">Error: Expecting value: line 1 column 1 (char 0)</div>
                </div>
            </div>

            <div class="test-category">Estimating</div>

            <div class="test-item">
                <div class="test-icon">❌</div>
                <div class="test-content">
                    <div class="test-name">Create Line Item</div>
                    <div class="test-duration">6.06s</div>
                    <div class="test-error">Error: Expecting value: line 1 column 1 (char 0)</div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
